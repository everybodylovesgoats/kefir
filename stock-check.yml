name: Meaco Cirro stock check

on:
  # Triggered externally by cron-job.org via the GitHub API (workflow_dispatch),
  # which runs on time. GitHub's own schedule is intentionally not used here, as
  # its scheduled runs are delayed/throttled and would double up with the pinger.
  # Also lets you trigger a run by hand from the Actions tab ("Run workflow").
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Send a test phone alert (instead of checking stock)"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Restores the "already alerted" memory from the previous run so you
      # aren't pinged every 15 minutes for the same in-stock result.
      - name: Restore alert memory
        uses: actions/cache@v4
        with:
          path: seen.json
          key: meaco-seen-${{ github.run_id }}
          restore-keys: |
            meaco-seen-

      # Normal behaviour: actually check stock.
      - name: Run the stock check
        if: ${{ github.event.inputs.test_alert != 'true' }}
        env:
          MEACO_STATE_FILE: seen.json
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python meaco_stock_check.py

      # Only runs when you tick "Send a test phone alert" on a manual run.
      - name: Send a test phone alert
        if: ${{ github.event.inputs.test_alert == 'true' }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python -c "import meaco_stock_check as m; print('Sending test to topic:', m.NTFY_TOPIC); m.phone_notify('Meaco Cirro stock alert', 'TEST from GitHub Actions - this is what a real alert looks like\nhttps://www.meaco.com/products/meaco-cirro-14000-btu-super-quiet-inverter-smart-portable-air-conditioner', click_url='https://www.meaco.com/products/meaco-cirro-14000-btu-super-quiet-inverter-smart-portable-air-conditioner')"
